name: Package Install UAT

# Runs after CI completes — the sync-genesis job in ci.yml publishes
# the package to .github/package/myelin/ before this workflow triggers.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  # ── Fresh install via genesis package ─────────────────────────────────────
  fresh-install-package:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Simulate package install
        run: |
          # Create extension directory
          EXT_DIR="$HOME/.copilot/extensions/myelin"
          mkdir -p "$EXT_DIR"

          # Copy genesis package files (simulates downloading from repo)
          cp .github/package/myelin/extension.mjs "$EXT_DIR/"
          cp .github/package/myelin/package.json "$EXT_DIR/"

          # Install runtime deps
          cd "$EXT_DIR" && npm install --omit=dev

          # Verify extension exists
          test -f "$EXT_DIR/extension.mjs" && echo "✅ Extension installed" || exit 1
          test -d "$EXT_DIR/node_modules/better-sqlite3" && echo "✅ Native deps installed" || exit 1
