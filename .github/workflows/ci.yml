name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  sync-genesis:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Bundle extension
        run: npm run bundle-extension

      - name: Generate extension package.json
        run: |
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            const extPkg = {
              name: 'myelin-extension',
              version: pkg.version,
              description: 'Myelin Copilot CLI extension runtime dependencies',
              dependencies: {
                'better-sqlite3': pkg.dependencies['better-sqlite3'],
                'sqlite-vec': pkg.dependencies['sqlite-vec'],
                'web-tree-sitter': pkg.dependencies['web-tree-sitter'],
                '@vscode/tree-sitter-wasm': pkg.dependencies['@vscode/tree-sitter-wasm']
              }
            };
            require('fs').writeFileSync('.github/package/myelin/package.json', JSON.stringify(extPkg, null, 2) + '\n');
          "

      - name: Sync registry version
        run: node scripts/sync-genesis-registry.mjs

      - name: Commit genesis package updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/package/myelin/extension.mjs .github/package/myelin/package.json .github/registry.json
          git diff --cached --quiet || git commit -m "chore: sync genesis package bundle and registry"
          git push
